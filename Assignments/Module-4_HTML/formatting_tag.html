<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting Tag in HTML</title>
</head>

<body>
    <h1>
        <center>Formatting Tag Example</center>
    </h1>
    <hr>
    <b>This is Bold</b> <br>
    <i>This is Italic</i> <br>
    <u>This is Underline</u> <br>
    <mark>This is Important</mark> <br>
    <big>This is Big</big> <br>
    <small>This is Small</small> <br>
    <strike>50%</strike> <br>
    <del>50%</del> <br>
    X<sup>5</sup> <br>
    Y<sub>2</sub>
</body>

</html>
