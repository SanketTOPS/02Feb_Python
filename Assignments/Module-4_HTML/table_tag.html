<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag in HTML</title>
</head>

<body>
    <center>
        <h1>Table Tag in HTML</h1>
    </center>
    <hr>
    <table border="2" align="center">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Sanket</td>
            <td>Rajkot</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Nirav</td>
            <td>Baroda</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Hitesh</td>
            <td>Surat</td>
        </tr>

    </table>

</body>

</html>
