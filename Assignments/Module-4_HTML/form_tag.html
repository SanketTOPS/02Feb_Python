<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag in HTML</title>
</head>

<body>
    <center>
        <h1>Form Tag in HTML</h1>
    </center>
    <hr>
    <form>
        <input type="text" placeholder="Name" required> <br>
        <input type="email" placeholder="Email"> <br>
        <input type="password" placeholder="Password"> <br>
        <input type="date" placeholder="DOB"> <br>
        <input type="radio" name="gen" checked>Male
        <input type="radio" name="gen">Female <br>
        <input type="checkbox">Gujarati <br>
        <input type="checkbox">Hindi <br>
        <input type="checkbox">English <br>
        <select>
            <option>Rajkot</option>
            <option>Ahmedabad</option>
            <option>Baroda</option>
            <option>Navsari</option>
        </select> <br>
        <input type="file"> <br>
        <input type="button" value="Save">
        <input type="submit">
        <input type="reset">
    </form>
</body>

</html>
