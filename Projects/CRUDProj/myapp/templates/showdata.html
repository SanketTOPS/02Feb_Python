<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Data</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        table thead {
            background: #4facfe;
            color: white;
        }

        table th,
        table td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        table tbody tr:hover {
            background: #f1f1f1;
            transition: 0.3s;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .edit-btn {
            background: #28a745;
        }

        .delete-btn {
            background: #dc3545;
        }

        @media(max-width: 768px) {

            table th,
            table td {
                padding: 10px;
                font-size: 14px;
            }

            .btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>User Data Table</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>DOB</th>
                    <th>Mobile</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for i in udata %}

                <tr>
                    <td>{{ i.id }}</td>
                    <td>{{ i.fullname }}</td>
                    <td>{{ i.email }}</td>
                    <td>{{ i.dob }}</td>
                    <td>{{ i.mobile }}</td>

                    <td>
                        <a href="/updatedata/{{i.id}}" class="btn edit-btn">Edit</a>

                        <a href="/deletedata/{{i.id}}" class="btn delete-btn"
                            onclick="return confirm('Are you sure you want to delete this record?')">
                            Delete
                        </a>
                    </td>
                </tr>

                {% endfor %}

            </tbody>
        </table>

    </div>

</body>

</html>
