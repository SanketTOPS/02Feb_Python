{% extends 'Userapp/base.html' %}

{% block title %}Admin Login - NotesVault{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="glass-card p-10 shadow-2xl border-white/20">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-full mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold gradient-text">Staff Login</h2>
            <p class="text-gray-500 mt-2">Enter your administrative credentials</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Admin Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </span>
                    <input type="text" name="username" class="input-field w-full pl-10 p-4 rounded-xl" placeholder="Admin Username" required>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </span>
                    <input type="password" name="password" class="input-field w-full pl-10 p-4 rounded-xl" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="pt-4">
                <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg shadow-xl hover:shadow-white/10 transition-all">
                    Access Dashboard
                </button>
            </div>
        </form>
        
        <div class="mt-8 text-center">
            <a href="{% url 'login' %}" class="text-sm text-gray-500 hover:text-white transition-colors">Switch to User Login</a>
        </div>
    </div>
</div>
{% endblock %}
