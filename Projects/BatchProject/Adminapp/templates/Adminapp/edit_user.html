{% extends 'Userapp/base.html' %}

{% block title %}Edit User - Admin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="glass-card p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center gradient-text">Edit User Details</h2>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input type="text" name="username" value="{{ target_user.username }}" class="input-field w-full p-3 rounded-lg" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                <input type="email" name="email" value="{{ target_user.email }}" class="input-field w-full p-3 rounded-lg" required>
            </div>
            <div class="flex space-x-4 pt-4">
                <button type="submit" class="btn-primary flex-1 py-3 rounded-lg font-bold">
                    Save Changes
                </button>
                <a href="{% url 'admin_dashboard' %}" class="flex-1 text-center py-3 rounded-lg font-bold bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
