{% extends 'Userapp/base.html' %}

{% block title %}Forgot Password - NotesVault{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="glass-card p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-4 text-center gradient-text">Forgot Password</h2>
        <p class="text-gray-400 text-center mb-6 text-sm">Enter your username or email address to receive a verification OTP.</p>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username or Email</label>
                <input type="text" name="identifier" class="input-field w-full p-3 rounded-lg" placeholder="Username or Email" required>
            </div>
            <button type="submit" class="btn-primary w-full py-3 rounded-lg font-bold mt-4">
                Send OTP
            </button>
        </form>
        
        <p class="mt-6 text-center text-gray-500">
            Remembered your password? <a href="{% url 'login' %}" class="text-white hover:underline">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
