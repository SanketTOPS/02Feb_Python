{% extends 'Userapp/base.html' %}

{% block title %}Verify OTP - NotesVault{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="glass-card p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-4 gradient-text">Verify Email</h2>
        <p class="text-gray-400 mb-8">Enter the 6-digit code sent to your email.</p>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <input type="text" name="otp" maxlength="6" class="input-field w-full text-center text-4xl tracking-widest p-4 rounded-lg font-bold" placeholder="000000" required>
            <button type="submit" class="btn-primary w-full py-3 rounded-lg font-bold">
                Verify & Login
            </button>
        </form>
        
        <p class="mt-6 text-sm text-gray-500">
            Didn't receive the code? <a href="#" class="text-white hover:underline">Resend OTP</a>
        </p>
    </div>
</div>
{% endblock %}
