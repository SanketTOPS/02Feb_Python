{% extends 'Userapp/base.html' %}

{% block title %}Reset Password - NotesVault{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="glass-card p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center gradient-text">New Password</h2>
        <p class="text-gray-400 text-center mb-6 text-sm">Please choose a strong new password for your account.</p>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">New Password</label>
                <input type="password" name="new_password" class="input-field w-full p-3 rounded-lg" placeholder="••••••••" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Confirm New Password</label>
                <input type="password" name="confirm_password" class="input-field w-full p-3 rounded-lg" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary w-full py-3 rounded-lg font-bold mt-6">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
