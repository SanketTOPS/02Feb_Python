<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NotesApp{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        .gradient-text {
            background: linear-gradient(to right, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: #ffffff;
            color: #000000;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #ffffff;
            outline: none;
        }
        select.input-field option {
            background-color: #1a1a1a;
            color: white;
        }
    </style>
</head>
<body class="flex flex-col">
    <nav class="p-6 flex justify-between items-center border-b border-white/10">
        <a href="/" class="text-2xl font-bold gradient-text">NotesVault</a>
        <div class="space-x-6 flex items-center">
            <a href="{% url 'home' %}" class="hover:text-gray-400">Home</a>
            <a href="{% url 'about' %}" class="hover:text-gray-400">About</a>
            <a href="{% url 'contact' %}" class="hover:text-gray-400">Contact</a>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="hover:text-gray-400">Dashboard</a>
                <a href="{% url 'logout' %}" class="hover:text-gray-400">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="hover:text-gray-400">Login</a>
                <a href="{% url 'signup' %}" class="btn-primary px-4 py-2 rounded-lg font-medium">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12">
        {% if messages %}
            <div class="mb-8">
                {% for message in messages %}
                    <div class="p-4 rounded-lg {% if message.tags == 'error' %}bg-red-500/20 text-red-400 border border-red-500/50{% else %}bg-green-500/20 text-green-400 border border-green-500/50{% endif %} mb-4">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>

    <footer class="p-8 text-center text-gray-500 border-t border-white/10">
        <p>&copy; 2026 NotesVault. All rights reserved.</p>
    </footer>
</body>
</html>
