{% extends 'Userapp/base.html' %}

{% block title %}Verify OTP - NotesVault{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center">
    <div class="glass-card p-8 shadow-2xl">
        <h2 class="text-3xl font-bold mb-4 gradient-text">Verify Reset OTP</h2>
        <p class="text-gray-400 mb-8">We've sent a 6-digit code to your email. Please enter it below to reset your password.</p>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="flex justify-center space-x-2">
                <input type="text" name="otp" maxlength="6" class="input-field text-center text-2xl tracking-widest w-full p-4 rounded-lg font-bold" placeholder="000000" required>
            </div>
            
            <button type="submit" class="btn-primary w-full py-4 rounded-lg font-bold text-lg shadow-lg">
                Verify & Continue
            </button>
        </form>
        
        <div class="mt-8 text-sm text-gray-500">
            Didn't receive the code? <a href="{% url 'forgot_password' %}" class="text-white hover:underline">Resend OTP</a>
        </div>
    </div>
</div>
{% endblock %}
