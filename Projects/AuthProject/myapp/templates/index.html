<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-gray-900 via-gray-800 to-black flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-6">

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-lg p-8">

            <!-- Title -->
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
                Login
            </h2>

            <!-- Form -->
            <form action="#" method="POST" class="space-y-5">
                {% csrf_token %}
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">
                        Email Address
                    </label>
                    <input type="email" name="email" placeholder="Enter your email"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black outline-none" required>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">
                        Password
                    </label>
                    <input type="password" name="password" placeholder="Enter your password"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black outline-none" required>
                </div>

                <!-- Options -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" class="accent-black">
                        Remember me
                    </label>

                    <a href="#" class="text-black hover:underline">
                        Forgot password?
                    </a>
                </div>

                <!-- Button -->
                <button type="submit"
                    class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition duration-300">
                    Login
                </button>

            </form>

            <!-- Signup -->
            <p class="text-center text-sm text-gray-600 mt-5">
                Don’t have an account?
                <a href="/signup" class="text-black font-semibold hover:underline">
                    Sign up
                </a>
            </p>

        </div>

    </div>

</body>

</html>
